	     dur="20s"
	     fill="freeze"
	     calcMode = "spline"
	     keyTimes="0; 0.25; 0.75; 1"
	     keySplines ="1 0 .5 1; .5 .0 .5 1; .5 .0 0 1"     
	     />
	  </text>  
	  <text  x="720" y="100" font-size="50"
