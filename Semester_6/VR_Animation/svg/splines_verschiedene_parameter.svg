             values="100;700;300;900" 
	     dur="20s"
	     fill="freeze"
	     calcMode = "spline"
	     keyTimes="0; 0.45; 0.55; 1"
	     keySplines ="1 0 .75 1; .25 .0 .25 1; .75 .0 0 1"          
	     />
	  </text>
  
	  <text  x="870" y="100" font-size="50"
          fill="#003366">H  
	     <animate attributeName="y" 
	     attributeType="XML"
             values="100;700;300;900" 
	     dur="20s"
	     fill="freeze"
	     calcMode = "spline"
	     keyTimes="0; .5; .5; 1"
	     keySplines ="1 0 .25 1; .75 .0 .25 1; .75 .0 0 1"          
	     />
	  </text> 
	  <text  x="920" y="100" font-size="50"
          fill="#003366">I 
	     <animate attributeName="y" 
	     attributeType="XML"
             values="100;366.7;633.3;900" 
	     dur="20s"
	     fill="freeze"
	     calcMode = "spline"
	     keyTimes="0; .3333; .6667; 1"
	     keySplines ="1 0 .5 1; .5 .0 .5 1; .5 .0 0 1"          
	     />
	  </text> 
	  <text  x="950" y="100" font-size="50"
          fill="#003366">J
	     <animate attributeName="y" 
	     attributeType="XML"
             values="100;300;500;700;900" 
	     dur="20s"
	     fill="freeze"
	     calcMode = "spline"
	     keyTimes="0; .2; .4; .6; 1"
             keySplines=".75 .25 .2 .9; .8 .1 .3 .4; .7 .6 .1 .1; .9 .9 .2 .6"
	     />
	  </text>	  
</svg>

