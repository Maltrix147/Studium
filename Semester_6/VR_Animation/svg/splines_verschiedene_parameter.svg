	     <animate attributeName="y" 
	     attributeType="XML"
             values="100;600;400;900" 
	     dur="20s"
	     fill="freeze"
	     calcMode = "spline"
	     keyTimes="0; 0.25; 0.75; 1"
	     keySplines ="1 0 .25 1; .75 .0 .25 1; .75 .0 0 1"     
	     />
	  </text>     
	  <text  x="770" y="100" font-size="50"
