<?xml version="1.0" encoding="iso-8859-1" ?> 
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" 
  "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg width="500px" height="500px" viewBox="0 0 1000 1000" 
  xmlns="http://www.w3.org/2000/svg" version="1.1">
 
	<title>Grundform: Animationsmethode spline</title> 
	<desc> SVG Beispiel: Buchstaben werden animiert.
	Es werden verschiedene splines oder Bezierkurven
	fuer den Zeitverlauf vorgestellt. 
	</desc> 

	  <rect  x="5" y="5" width="990" height="990" 
	  rx="100" ry="100"
          fill="rgb(100%,100%,100%)" 
	  stroke="rgb(50%,50%,50%)" 
	  stroke-dasharray="10,30,20,30" 
	  stroke-dashoffset="0" 
	  stroke-width="10">
	  <desc> Animierter Aussenrahmen</desc>
	     <animate attributeName="stroke-dashoffset" 
	     attributeType="XML"
             values="0;90;-90;0" 
	     dur="23s"  repeatCount="indefinite" /> 
	  </rect>

	  
	  <text  x="20" y="100" font-size="50"
          fill="#003366">0
	     <animate attributeName="y" 
	     attributeType="XML"
             values="100;900" 
	     dur="20s"
	     fill="freeze"
	     calcMode = "linear"
	     />
	  </text>
	  <text  x="70" y="100" font-size="50"
          fill="#003366">1
	     <animate attributeName="y" 
	     attributeType="XML"
             values="100;900" 
	     dur="20s"
	     fill="freeze"
	     calcMode = "spline"
	     keyTimes="0; 1"
	     keySplines ="0 0 1 1"     
	     />  
	  </text>
	  <text  x="120" y="100" font-size="50"
          fill="#003366">2	  
	     <animate attributeName="y" 
	     attributeType="XML"
             values="100;900" 
	     dur="20s"
	     fill="freeze"
	     calcMode = "spline"
	     keyTimes="0; 1"
	     keySplines ="0 1 0 1"    
	     /> 
	  </text>  
	  <text x="170" y="100" font-size="50"
          fill="#003366">3	  
	     <animate attributeName="y" 
	     attributeType="XML"
             values="100;900" 
	     dur="20s"
	     fill="freeze"
	     calcMode = "spline"
	     keyTimes="0; 1"
	     keySplines ="1 0 1 0"     
	     />  
	  </text>  
	  <text x="220" y="100" font-size="50"
          fill="#003366">4  
	     <animate attributeName="y" 
	     attributeType="XML"
             values="100;900" 
	     dur="20s"
	     fill="freeze"
	     calcMode = "spline"
	     keyTimes="0; 1"
	     keySplines ="0 1 1 0"     
	     />  
	  </text>  	    
	  <text  x="270" y="100" font-size="50"
          fill="#003366">5 
	     <animate attributeName="y" 
	     attributeType="XML"
             values="100;900" 
	     dur="20s"
	     fill="freeze"
	     calcMode = "spline"
	     keyTimes="0; 1"
	     keySplines ="1 0 0 1"     
	     />	  
	  </text>
	  <text  x="320" y="100" font-size="50"
          fill="#003366">6  
	     <animate attributeName="y" 
	     attributeType="XML"
             values="100;900" 
	     dur="20s"
	     fill="freeze"
	     calcMode = "spline"
	     keyTimes="0; 1"
	     keySplines ="1 0 0 .5"     
	     />
	  </text>  
	  <text  x="370" y="100" font-size="50"
          fill="#003366">7	  
	     <animate attributeName="y" 
	     attributeType="XML"
             values="100;900" 
	     dur="20s"
	     fill="freeze"
	     calcMode = "spline"
	     keyTimes="0; 1"
	     keySplines =".5 0 .5 1"     
