<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<svg xmlns="http://www.w3.org/2000/svg" width="340" height="270">
  <title>Animierter Kreis</title>
  <desc>Ein roter Kreis</desc>

  <circle cx="70" cy="95" r="50"
          style="stroke: black; fill: red;">
     <animate id="ani1"
            attributeName="cx" begin="0s" dur="10s"                     
            values="70; 100; 150"
            keyTimes="0; 0.5; 1"
            calcMode="linear" />
     <animate attributeName="cy" begin="0s" dur="10s"                                 calcMode="linear"
            values="95; 100; 150"
            keyTimes="0; 0.5; 1" />

     <animate id="ani2"
              attributeName="cx" begin="ani1.end+2s" dur="10s"
              values="70; 100; 150"
              keyTimes="0; 0.5; 1"
              calcMode="discrete" fill="freeze" />
     <animate attributeName="cy" begin="ani1.end+2s" dur="10s"                          calcMode="discrete"
              values="95; 100; 150"
              keyTimes="0; 0.5; 1" fill="freeze"/>

     <animate id="ani3"
              attributeName="cx" begin="ani2.end+2s" dur="10s"
              values="70; 100; 150"
              keyTimes="0; 0.5; 1"
              calcMode="paced" />
     <animate attributeName="cy" begin="ani2.end+2s" dur="10s"                          calcMode="paced"
              values="95; 100; 150"
              keyTimes="0; 0.5; 1" />
  </circle>
  <!-- Hilfslinien: -->
  <line x1="70" y1="95" x2="150" y2="150"
        stroke="yellow" stroke-width="1" />
  <line x1="70" y1="95" x2="100" y2="100"
        stroke="yellow" stroke-width="1" />
  <line x1="100" y1="100" x2="150" y2="150"
        stroke="yellow" stroke-width="1" />
  <circle cx="70" cy="95" r="5" fill="yellow" />
  <circle cx="150" cy="150" r="5" fill="yellow" />
  <circle cx="100" cy="100" r="5" fill="yellow" />


</svg>
